{% extends 'base.html' %}

{% block title %}Create Ban - {{ grid_name }} Portal{% endblock %}

{% block content %}
<div style="max-width: 800px; margin: 0 auto;">
    <div class="flex-between mb-20" style="align-items: flex-end;">
        <div>
            <h1 class="text-danger m-0">Issue Ban</h1>
            <p class="text-muted m-0 mt-5">Actively block avatars, hardware, or networks.</p>
        </div>
        <a href="{{ url_for('user_mgmt.manage_bans') }}" class="text-muted fw-bold" style="text-decoration: none;">&larr; View All Bans</a>
    </div>

    <form method="POST" action="{{ url_for('user_mgmt.create_ban') }}" class="group m-0" style="border-top: 4px solid var(--danger);">

        <fieldset class="m-0 mb-20">
            <legend>Ban Details</legend>
            <label for="reason">Reason for Ban</label>
            <input type="text" id="reason" name="reason" placeholder="e.g., Griefing Welcome Area" required>

            <label for="type">Ban Scope</label>
            <select name="type" id="type" class="w-100 mb-0">
                <option value="account" {% if request.args.get('type') == 'account' %}selected{% endif %}>Account</option>
                <option value="ip" {% if request.args.get('type') == 'ip' %}selected{% endif %}>IP Firewall</option>
                <option value="mac" {% if request.args.get('type') == 'mac' %}selected{% endif %}>MAC Hardware</option>
                <option value="hostid" {% if request.args.get('type') == 'hostid' %}selected{% endif %}>Host ID</option>
            </select>
        </fieldset>

        <fieldset class="m-0" style="background: var(--danger-bg); border-color: var(--danger);">
            <legend class="fw-bold" style="color: var(--danger-text); background: transparent;">Ban Targets (One per line)</legend>

            <div class="grid-cards" style="grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <label>Avatar UUIDs</label>
                    <textarea name="uuids" rows="4" style="font-family: monospace;" class="mb-0">{{ prep_uuid }}</textarea>
                </div>
                <div>
                    <label>IP Addresses</label>
                    <textarea name="ips" rows="4" style="font-family: monospace;" class="mb-0">{{ prep_ip }}</textarea>
                </div>
                <div>
                    <label>MAC Addresses</label>
                    <textarea name="macs" rows="4" style="font-family: monospace;" class="mb-0">{{ prep_mac }}</textarea>
                </div>
                <div>
                    <label>Host IDs</label>
                    <textarea name="hostids" rows="4" style="font-family: monospace;" class="mb-0">{{ prep_hostid }}</textarea>
                </div>
            </div>
        </fieldset>

        <div class="text-right mt-20">
            <button type="submit" class="btn-danger">Enforce Ban</button>
        </div>
    </form>
</div>
{% endblock %}
