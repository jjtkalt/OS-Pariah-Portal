{% extends 'base.html' %}

{% block title %}Add Region - OS Pariah Portal{% endblock %}

{% block content %}
<div style="max-width: 800px; margin: 0 auto;">
    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px;">
        <div>
            <h1 style="color: var(--primary); margin: 0;">Add Manual Region</h1>
            <p style="color: var(--text-muted); margin-top: 5px; margin-bottom: 0;">Pre-configure a region before importing its DB data.</p>
        </div>
        <a href="{{ url_for('regions.manage_regions') }}" style="color: var(--text-muted); text-decoration: none; font-weight: 600;">&larr; Back to List</a>
    </div>

    <form method="POST" action="{{ url_for('regions.add_region') }}" class="group">
        <fieldset>
            <legend>Basic Configuration</legend>
            
            <label for="region_name">Region Name</label>
            <input type="text" id="region_name" name="region_name" placeholder="e.g., Elysium Hub" required>

            <label for="region_uuid">Region UUID</label>
            <input type="text" id="region_uuid" name="region_uuid" placeholder="e.g., 123e4567-e89b-12d3-a456-426614174000" pattern="[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}" title="Must be a valid UUID format." required>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <label for="Location">Location (Grid X, Y)</label>
                    <input type="text" id="Location" name="Location" placeholder="1000,1000" required>
                </div>
                <div>
                    <label for="InternalPort">Internal Port</label>
                    <input type="text" id="InternalPort" name="InternalPort" placeholder="9000" required>
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Limits & Dimensions</legend>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <label for="MaxPrims">Max Prims</label>
                    <input type="text" id="MaxPrims" name="MaxPrims" value="15000">
                </div>
                <div>
                    <label for="Size">Region Size (Square)</label>
                    <select id="Size" name="Size" required>
                        {% for s in sizes %}
                            <option value="{{ s }}" {% if s == 256 %}selected{% endif %}>{{ s }}x{{ s }} meters</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </fieldset>

        <div style="text-align: right; margin-top: 20px;">
            <button type="submit">+ Add to Database</button>
        </div>
    </form>
</div>
{% endblock %}
