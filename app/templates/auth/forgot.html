{% extends 'base.html' %}
{% block title %}Forgot Password - {{ grid_name }} Portal{% endblock %}

{% block content %}
<div class="text-center">
    <h1 class="text-primary m-0">Password Recovery</h1>
    <p class="text-muted mb-20 mt-10">Enter your Avatar Name to receive a secure reset link.</p>
</div>

<div style="max-width: 500px; margin: 0 auto;">
    <form method="POST" action="{{ url_for('auth.forgot_password') }}" class="group" style="background: var(--input-bg);">

        <div class="d-flex gap-10 mb-10">
            <div class="w-100">
                <label>First Name</label>
                <input type="text" name="first_name" placeholder="John" required autofocus>
            </div>
            <div class="w-100">
                <label>Last Name</label>
                <input type="text" name="last_name" placeholder="Resident" required>
            </div>
        </div>

        <div class="flex-center mt-10 mb-10">
            <div class="cf-turnstile" data-sitekey="{{ site_key }}" data-callback="captchaSolved"></div>
        </div>

        <button type="submit" id="submitBtn" class="w-100 text-lg mt-10" disabled>Send Reset Link</button>
    </form>

    <div class="text-center mt-20">
        <a href="{{ url_for('auth.login') }}" class="text-muted" style="text-decoration: none;">&larr; Back to Login</a>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function captchaSolved() {
        document.getElementById('submitBtn').disabled = false;
    }
</script>
{% endblock %}
