{% extends 'base.html' %}
{% block title %}Choose New Password - {{ grid_name }} Portal{% endblock %}

{% block content %}
<div class="center">
    <h1 style="color: var(--primary);">Secure Password Reset</h1>
    <p style="color: var(--text-muted); margin-bottom: 24px;">Please choose a strong, new password for your OpenSim avatar.</p>
</div>

<div style="max-width: 500px; margin: 0 auto;">
    <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}" class="group" style="background: white;" onsubmit="return validatePassword()">
        <label>New Password</label>
        <input type="password" id="new_password" name="new_password" required autofocus>
        
        <label>Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" required>
        <small id="passMatchText" style="color: var(--danger); display: none; margin-bottom: 15px; font-weight: bold;">Passwords do not match.</small>

        <button type="submit" id="passSubmitBtn" style="width: 100%; font-size: 1.1rem; margin-top: 10px;">Update Password</button>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    const newPass = document.getElementById('new_password');
    const confPass = document.getElementById('confirm_password');
    const matchText = document.getElementById('passMatchText');

    function checkMatch() {
        if (confPass.value.length > 0 && newPass.value !== confPass.value) {
            matchText.style.display = 'block';
            return false;
        } else {
            matchText.style.display = 'none';
            return true;
        }
    }

    newPass.addEventListener('input', checkMatch);
    confPass.addEventListener('input', checkMatch);

    function validatePassword() {
        if (!checkMatch() || newPass.value === '') {
            matchText.style.display = 'block';
            return false;
        }
        return true;
    }
</script>
{% endblock %}
