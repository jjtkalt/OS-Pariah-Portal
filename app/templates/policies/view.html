{% extends 'base.html' %}

{% block title %}{{ policy.title }} - {{ grid_name }} Portal{% endblock %}

{% block content %}
<div class="card p-0" style="padding: 40px;">
    <div class="mb-20 pb-10" style="border-bottom: 2px solid var(--primary);">
        <h1 class="m-0 text-primary">{{ policy.title }}</h1>
        <p class="text-muted text-sm mt-10 m-0" style="font-family: monospace;">
            <strong>Policy Version:</strong> {{ version }} <br>
            <strong>Last Updated:</strong> {{ policy.updated_at.strftime('%B %d, %Y at %H:%M UTC') }}
        </p>
    </div>

    <div style="line-height: 1.6; white-space: pre-wrap; color: var(--text-main);">
        {{ policy.body }}
    </div>
</div>
{% endblock %}
