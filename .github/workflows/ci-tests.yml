name: Automated Tests

# Tell GitHub WHEN to run this script
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches: [main]

# Least-privilege default token: clone + dependency cache only (no packages/issues/PR writes).
permissions:
  contents: read
  actions: write # setup-python pip cache restore/save via actions/cache

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Ruff
        # Pin to match .pre-commit-config.yaml rev and requirements-dev.txt.
        run: python -m pip install "ruff==0.15.22"

      - name: Ruff lint
        run: ruff check --output-format=github .

      - name: Ruff format check
        run: ruff format --check .

  test:
    # Tell GitHub WHAT kind of temporary server to spin up
    runs-on: ubuntu-latest

    steps:
      # 1. Download your code onto the temporary server
      - name: Checkout Code
        uses: actions/checkout@v6

      # 2. Install Python 3.12
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip # Speeds up future runs!

      # 3. Install your app's dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # 4. Run the Phase 0 Safety Net!
      - name: Run Pytest
        run: pytest -v tests/
