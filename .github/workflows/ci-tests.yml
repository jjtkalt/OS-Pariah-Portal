name: Automated Tests

# Tell GitHub WHEN to run this script
on:
  push:
    branches: [ "Main", "dev" ]
  pull_request:
    branches: [ "Main" ]

jobs:
  test:
    # Tell GitHub WHAT kind of temporary server to spin up
    runs-on: ubuntu-latest

    steps:
    # 1. Download your code onto the temporary server
    - name: Checkout Code
      uses: actions/checkout@v6

    # 2. Install Python 3.12
    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: 'pip' # Speeds up future runs!

    # 3. Install your app's dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-flask

    # 4. Run the Phase 0 Safety Net!
    - name: Run Pytest
      run: |
        pytest -v tests/
