name: Build and Publish RPM

on:
  release:
    types: [published]

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    # THIS is the magic: GitHub will pull a native openSUSE container to run our commands!
    container:
      image: opensuse/leap:15.6

    steps:
    # 1. OpenSUSE minimal containers don't come with git or tar, so we install them first
    - name: Install Prerequisites & RPM Tools
      run: |
        zypper refresh
        zypper install -y git tar gzip rsync rpm-build rpmdevtools sed

    # 2. Checkout the code (now that git is installed)
    - name: Checkout Code
      uses: actions/checkout@v4

    # 3. Setup the build tree, extract version, and pack the tarball
    - name: Prepare RPM Environment
      run: |
        # Grab the GitHub Release Tag (e.g., "v0.9.1") and strip the "v" prefix
        TAG="${{ github.event.release.tag_name }}"
        APP_VERSION="${TAG#v}"
        
        echo "Building version: $APP_VERSION"
        
        rpmdev-setuptree
        mkdir -p /tmp/os-pariah-portal-$APP_VERSION
        rsync -a --exclude='.git' --exclude='.github' ./ /tmp/os-pariah-portal-$APP_VERSION/
        tar -czvf $HOME/rpmbuild/SOURCES/os-pariah-portal-$APP_VERSION.tar.gz -C /tmp os-pariah-portal-$APP_VERSION
        
        # Copy the spec file and dynamically update the Version line
        cp packaging/os-pariah.spec $HOME/rpmbuild/SPECS/
        sed -i "s/^Version:.*/Version: $APP_VERSION/" $HOME/rpmbuild/SPECS/os-pariah.spec

    # 4. Compile the RPM natively on openSUSE!
    - name: Compile the RPM
      run: rpmbuild -ba --define "build_number ${{ github.run_number }}" $HOME/rpmbuild/SPECS/os-pariah.spec

    # 5. Sign the RPM using our injected GPG Key
    - name: Sign the RPM
      env:
        GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        GPG_PASS: ${{ secrets.GPG_PASSPHRASE }}
      run: |
        # Import the key to the container
        echo "$GPG_KEY" | gpg --import
        
        # Get the key ID we just imported
        KEY_ID=$(gpg --list-keys --with-colons | awk -F: '/^pub:/ { print $5; exit }')
        
        # Configure RPM to use this key and a non-interactive passphrase loopback
        echo "%_signature gpg" > ~/.rpmmacros
        echo "%_gpg_name $KEY_ID" >> ~/.rpmmacros
        echo "%__gpg_sign_cmd %{__gpg} gpg --no-tty --pinentry-mode loopback --batch --passphrase $GPG_PASS --sign --detach-sign --armor %{__plaintext_filename}" >> ~/.rpmmacros
        
        # Sign the package!
        rpmsign --addsign $HOME/rpmbuild/RPMS/x86_64/*.rpm

    # 6. Attach the finished .rpm file to your GitHub Release
    - name: Attach RPM to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: /github/home/rpmbuild/RPMS/x86_64/os-pariah-portal-*.rpm